backend:
  name: github
  repo: teguh407/tdsign-portfolio
  branch: main
  # Sveltia CMS handles GitHub OAuth via its built-in auth proxy
  # (auth.sveltia.dev — fork of decap-proxy). No Netlify needed.
  auth_type: pkce
  base_url: https://auth.sveltia.dev

# All edits commit straight to main → GitHub Pages auto-rebuilds (~30s)
publish_mode: simple

media_folder: assets/mascots
public_folder: assets/mascots

site_url: https://teguh407.github.io/tdsign-portfolio/
display_url: https://teguh407.github.io/tdsign-portfolio/
logo_url: https://teguh407.github.io/tdsign-portfolio/assets/favicon.svg

collections:
  - name: site
    label: Website Content
    description: Edit semua teks, gambar, dan harga di sini. Save → live dalam 30 detik.
    files:
      - name: site_content
        label: Site Content
        file: _data/site.json
        format: json
        editor:
          preview: false
        fields:
          # ---------------- Hero ----------------
          - label: "Hero Section"
            name: hero
            widget: object
            collapsed: false
            fields:
              - { label: "Badge text",       name: badge,         widget: string }
              - { label: "Title — line 1",   name: title_line1,   widget: string }
              - { label: "Title — line 2 (gradient)", name: title_line2, widget: string }
              - { label: "Subtitle",         name: subtitle,      widget: text }
              - { label: "Primary CTA label",   name: cta_primary,   widget: string }
              - { label: "Secondary CTA label", name: cta_secondary, widget: string }
              - { label: "Hero image",       name: hero_image,    widget: image }

          # ---------------- Stats ----------------
          - label: "Stats (4 metrics)"
            name: stats
            widget: list
            min: 4
            max: 4
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }

          # ---------------- Section titles ----------------
          - label: "Section Titles"
            name: section_titles
            widget: object
            collapsed: true
            fields:
              - { label: "Work — label",        name: work_label,         widget: string }
              - { label: "Work — title lead",   name: work_title_lead,    widget: string }
              - { label: "Work — title accent (gradient)", name: work_title_accent, widget: string }
              - { label: "Work — subtitle",     name: work_sub,           widget: text }

              - { label: "Services — label",    name: services_label,     widget: string }
              - { label: "Services — title lead",   name: services_title_lead,   widget: string }
              - { label: "Services — title accent", name: services_title_accent, widget: string }
              - { label: "Services — subtitle", name: services_sub,       widget: text }

              - { label: "Process — label",     name: process_label,      widget: string }
              - { label: "Process — title lead",   name: process_title_lead,   widget: string }
              - { label: "Process — title accent", name: process_title_accent, widget: string }
              - { label: "Process — subtitle",  name: process_sub,        widget: text }

              - { label: "Testimonials — label", name: testimonials_label, widget: string }
              - { label: "Testimonials — title lead",   name: testimonials_title_lead,   widget: string }
              - { label: "Testimonials — title accent", name: testimonials_title_accent, widget: string }
              - { label: "Testimonials — subtitle", name: testimonials_sub, widget: text }

              - { label: "Pricing — label",     name: pricing_label,      widget: string }
              - { label: "Pricing — title lead",   name: pricing_title_lead,   widget: string }
              - { label: "Pricing — title accent", name: pricing_title_accent, widget: string }
              - { label: "Pricing — subtitle",  name: pricing_sub,        widget: text }

          # ---------------- Mascots ----------------
          - label: "Featured Mascots (drag to reorder)"
            name: mascots
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: Name,  name: name,  widget: string }
              - { label: Role,  name: role,  widget: string }
              - { label: Image, name: image, widget: image }
              - label: "Glow color"
                name: color
                widget: select
                options: [blue, violet, cyan, pink, purple]
                default: blue

          # ---------------- Services ----------------
          - label: "Services (drag to reorder)"
            name: services
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title,       name: title, widget: string }
              - { label: Description, name: desc,  widget: text }
              - label: Icon
                name: icon
                widget: select
                options: [user, monitor, sparkle, banner, art]
                default: user

          # ---------------- Process ----------------
          - label: "Process Steps"
            name: process
            widget: list
            min: 4
            max: 4
            summary: "{{fields.num}} — {{fields.title}}"
            fields:
              - { label: "Number",      name: num,   widget: string }
              - { label: "Title",       name: title, widget: string }
              - { label: "Description", name: desc,  widget: text }

          # ---------------- Testimonials ----------------
          - label: "Testimonials (drag to reorder)"
            name: testimonials
            widget: list
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: Name,     name: name,     widget: string }
              - { label: Role,     name: role,     widget: string }
              - { label: "Flag emoji", name: flag, widget: string, hint: "e.g. 🇺🇸 🇯🇵 🇩🇪 🇮🇩" }
              - { label: "Avatar initials (2 chars)", name: initials, widget: string, pattern: ['^.{1,3}$', 'Max 3 characters'] }
              - { label: Quote,    name: quote,    widget: text }

          # ---------------- Pricing ----------------
          - label: "Pricing Tiers (drag to reorder)"
            name: pricing
            widget: list
            min: 1
            max: 5
            summary: "{{fields.name}} — ${{fields.amount}}"
            fields:
              - { label: "Tier label", name: tier,    widget: string }
              - { label: "Package name", name: name,  widget: string }
              - { label: "Amount (numeric, no $)", name: amount, widget: string }
              - { label: "Period",     name: period,  widget: string, default: "one-time" }
              - { label: "Most Popular badge", name: popular, widget: boolean, default: false }
              - label: "Features"
                name: features
                widget: list
                field: { label: Feature, name: feature, widget: string }
              - { label: "CTA Button label", name: cta_label, widget: string, default: "Order Now" }

          - label: "Pricing section mascot image"
            name: pricing_mascot_image
            widget: image

          # ---------------- Final CTA ----------------
          - label: "Final CTA Block"
            name: final_cta
            widget: object
            collapsed: true
            fields:
              - { label: "Eyebrow label", name: label,         widget: string }
              - { label: "Title — lead",  name: title_lead,    widget: string }
              - { label: "Title — accent (gradient)", name: title_accent, widget: string }
              - { label: "Subtitle",      name: subtitle,      widget: text }
              - { label: "Fiverr URL",    name: fiverr_url,    widget: string }
              - { label: "Fiverr label",  name: fiverr_label,  widget: string, default: "Order via Fiverr" }
              - { label: "Contact URL",   name: contact_url,   widget: string }
              - { label: "Contact label", name: contact_label, widget: string, default: "Contact Me" }

          # ---------------- Contact / Socials ----------------
          - label: "Social & Contact Links"
            name: contact
            widget: object
            collapsed: true
            fields:
              - { label: Discord,   name: discord,   widget: string, required: false }
              - { label: Twitter,   name: twitter,   widget: string, required: false }
              - { label: Instagram, name: instagram, widget: string, required: false }
              - { label: YouTube,   name: youtube,   widget: string, required: false }
              - { label: Email,     name: email,     widget: string, hint: "Use mailto:you@domain.com" }

          # ---------------- Footer ----------------
          - label: "Footer"
            name: footer
            widget: object
            collapsed: true
            fields:
              - { label: "Tagline / copyright", name: tagline, widget: string }
