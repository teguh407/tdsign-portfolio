<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0b1e" />
  <title>tdsign — Custom Anime Logos & Streamer Branding</title>
  <meta name="description" content="Custom chibi mascot logos, stream packages, and VTuber branding for streamers and content creators." />

  <meta property="og:title" content="tdsign — Custom Anime Logos & Streamer Branding" />
  <meta property="og:description" content="Custom chibi mascot logos and branding for streamers, VTubers, and content creators." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/og.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Background -->
  <div class="bg-gradient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
    <div class="sparkles">
      <span class="sparkle" style="top:8%;left:12%;animation-delay:0s"></span>
      <span class="sparkle" style="top:18%;left:78%;animation-delay:.6s;width:6px;height:6px"></span>
      <span class="sparkle" style="top:32%;left:42%;animation-delay:1.2s"></span>
      <span class="sparkle" style="top:55%;left:8%;animation-delay:.3s"></span>
      <span class="sparkle" style="top:62%;left:88%;animation-delay:1.8s;width:5px;height:5px"></span>
      <span class="sparkle" style="top:78%;left:35%;animation-delay:.9s"></span>
      <span class="sparkle" style="top:88%;left:72%;animation-delay:2.1s"></span>
    </div>
  </div>

  <!-- Nav -->
  <header class="nav">
    <div class="container nav-inner">
      <a href="#" class="logo">
        <span class="logo-mark"></span>
        <span>tdsign</span>
      </a>
      <nav class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#work">Work</a>
        <a href="#services">Services</a>
        <a href="#pricing">Pricing</a>
        <a href="#testimonials">Testimonials</a>
        <a href="admin/" class="admin-link">Admin</a>
      </nav>
      <a href="#pricing" class="btn btn-primary nav-cta">
        <span class="sparkle-icon"></span>
        Order Now
      </a>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="tdsign-vertical">TDSIGN STUDIO</div>
    <div class="container">
      <div class="hero-grid">
        <div class="hero-text">
          <div class="hero-tag fade-in" data-bind="hero.badge"></div>
          <h1 class="hero-title fade-in" style="animation-delay:.1s" data-bind="hero.title"></h1>
          <p class="hero-sub fade-in" style="animation-delay:.2s" data-bind="hero.subtitle"></p>
          <div class="hero-cta fade-in" style="animation-delay:.3s">
            <a href="#work" class="btn btn-primary btn-lg" data-bind="hero.cta_primary"></a>
            <a href="#contact" class="btn btn-ghost btn-lg" data-bind="hero.cta_secondary"></a>
          </div>
          <div class="hero-stats fade-in" style="animation-delay:.4s" data-bind="stats"></div>
        </div>

        <div class="hero-illust">
          <div class="td-sign-logo" aria-hidden="true">
            TD
            <span class="small">SIGN</span>
          </div>
          <div class="stream-card s1">BE RIGHT BACK</div>
          <div class="stream-card s2">STARTING SOON</div>
          <div class="stream-card s3">GETTING READY</div>
          <div class="chibi-hero">
            <div class="glow"></div>
            <img class="chibi-img" data-bind="hero.image" alt="tdsign hero mascot" />
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Selected Projects -->
  <section id="work" class="section">
    <div class="container">
      <div class="section-head with-link">
        <div class="head-text">
          <div class="section-label" data-bind="work.label"></div>
          <h2 class="section-title" data-bind="work.title"></h2>
          <p class="section-sub" data-bind="work.sub"></p>
        </div>
        <a href="#" class="view-all-link">View All Projects →</a>
      </div>
      <div class="portfolio-row" data-bind="mascots"></div>
    </div>
  </section>

  <!-- Services -->
  <section id="services" class="section">
    <div class="container">
      <div class="section-head">
        <div class="section-label" data-bind="services.label"></div>
        <h2 class="section-title" data-bind="services.title"></h2>
        <p class="section-sub" data-bind="services.sub"></p>
      </div>
      <div class="services-grid" data-bind="services"></div>
    </div>
  </section>

  <!-- Process -->
  <section id="process" class="section">
    <div class="container">
      <div class="section-head">
        <div class="section-label" data-bind="process.label"></div>
        <h2 class="section-title" data-bind="process.title"></h2>
        <p class="section-sub" data-bind="process.sub"></p>
      </div>
      <div class="process-wrap">
        <div class="process-mascot" aria-hidden="true">📱</div>
        <div class="process-steps" data-bind="process"></div>
        <div class="process-laptop" aria-hidden="true">💻</div>
      </div>
    </div>
  </section>

  <!-- Testimonials -->
  <section id="testimonials" class="section">
    <div class="container">
      <div class="section-head with-link">
        <div class="head-text">
          <div class="section-label" data-bind="testimonials.label"></div>
          <h2 class="section-title" data-bind="testimonials.title"></h2>
          <p class="section-sub" data-bind="testimonials.sub"></p>
        </div>
        <a href="#" class="view-all-link">View All Reviews →</a>
      </div>
      <div class="testimonials-grid" data-bind="testimonials"></div>
      <div class="t-nav">
        <button class="t-arrow" aria-label="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="t-arrow" aria-label="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- Pricing -->
  <section id="pricing" class="section">
    <div class="container">
      <div class="section-head">
        <div class="section-label" data-bind="pricing.label"></div>
        <h2 class="section-title" data-bind="pricing.title"></h2>
        <p class="section-sub" data-bind="pricing.sub"></p>
      </div>
      <div class="pricing-wrap">
        <div class="pricing-grid" data-bind="pricing"></div>
        <div class="pricing-mascot" aria-hidden="true">
          <div class="magic-circle"></div>
          <img class="pricing-mascot-img" data-bind="pricing_mascot_image" alt="" />
        </div>
      </div>
    </div>
  </section>

  <!-- Final CTA -->
  <section id="contact" class="final-cta">
    <div class="container">
      <div class="final-cta-card">
        <div class="section-label" data-bind="cta.label"></div>
        <h2 class="final-cta-title" data-bind="cta.title"></h2>
        <p class="final-cta-sub" data-bind="cta.subtitle"></p>
        <div class="final-cta-btns">
          <a class="btn btn-white btn-lg" data-bind="cta.fiverr">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23 16h-1v-3a4 4 0 00-4-4h-7v-1a2 2 0 012-2h2V3h-2a5 5 0 00-5 5v1H7v3h1v4H7v3h7v-3h-2v-4h6v4h-1v3h6v-3z"/></svg>
            <span>Order via Fiverr</span>
          </a>
          <a class="btn btn-primary btn-lg" data-bind="cta.contact">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            <span>Contact Me</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <a href="#" class="logo">
        <span class="logo-mark"></span>
        <span>tdsign</span>
      </a>
      <div class="footer-meta" data-bind="footer.tagline"></div>
      <div class="footer-socials">
        <a href="#" data-bind="footer.discord" aria-label="Discord"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4.5A20 20 0 0015.5 3l-.3.5a14 14 0 014 2 17 17 0 00-13 0 14 14 0 014-2L9.5 3A20 20 0 005 4.5C2 9 1 13 1.5 17a18 18 0 005.5 3l1-1.5a13 13 0 01-2-1l.5-.3a14 14 0 0011 0l.5.3a13 13 0 01-2 1l1 1.5a18 18 0 005.5-3c.5-5-.7-9-3-12.5zM9 14.5a2 2 0 110-4 2 2 0 010 4zm6 0a2 2 0 110-4 2 2 0 010 4z"/></svg></a>
        <a href="#" data-bind="footer.twitter" aria-label="Twitter"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 3h3l-7 8 8 10h-6l-5-6-5 6H3l7-9-7-9h6l4 5 5-5z"/></svg></a>
        <a href="#" data-bind="footer.instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor"/></svg></a>
        <a href="#" data-bind="footer.youtube" aria-label="YouTube"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 8a3 3 0 00-2-2c-2-.5-8-.5-10-.5s-8 0-10 .5a3 3 0 00-2 2c-.5 2-.5 4-.5 4s0 2 .5 4a3 3 0 002 2c2 .5 10 .5 10 .5s8 0 10-.5a3 3 0 002-2c.5-2 .5-4 .5-4s0-2-.5-4zM10 15V9l5 3-5 3z"/></svg></a>
        <a href="#" data-bind="footer.email" aria-label="Email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg></a>
      </div>
    </div>
  </footer>

  <!-- Render content from _data/site.json, then enable interactivity -->
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
